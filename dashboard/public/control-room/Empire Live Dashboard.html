<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Empire · Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  body { font-family: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="macos-window.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="empire-components.jsx"></script>
<script type="text/babel" src="empire-state.jsx"></script>
<script type="text/babel" src="empire-variation-studio.jsx"></script>
<script type="text/babel" src="empire-variation-console.jsx"></script>
<script type="text/babel" src="empire-variation-keynote.jsx"></script>
<script type="text/babel" src="empire-mac.jsx"></script>
<script type="text/babel" src="empire-mobile.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "featured": "mac",
  "showWeb": true,
  "mobileScreen": "home"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <>
      <EmpireGlobalStyles />
      <DesignCanvas>
        {/* Header callout */}
        <div style={{ padding: '0 60px 28px', maxWidth: 1200, fontFamily: E.font }}>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '6px 12px 6px 10px',
            background: 'rgba(255,255,255,0.7)',
            border: `1px solid ${E.hair}`,
            borderRadius: 999,
            fontFamily: E.mono, fontSize: 10, letterSpacing: 1.0,
            color: E.ink2, fontWeight: 600,
          }}>
            <span style={{ width: 7, height: 7, borderRadius: '50%', background: E.live }} />
            EMPIRE · MAC + MOBILE + WEB · APPLE-SPARE
          </div>
          <div style={{
            marginTop: 18, fontSize: 48, fontWeight: 600, letterSpacing: -1.4,
            color: E.ink, lineHeight: 1.05,
          }}>
            One seller. Two surfaces.
          </div>
          <div style={{
            marginTop: 10, fontSize: 17, color: E.ink2,
            lineHeight: 1.5, maxWidth: 720, letterSpacing: -0.1,
          }}>
            A Mac control room that runs the stream, and an iOS companion that films the product and
            watches the money come in. Both auto-play the same INTRO → BRIDGE → PITCH → LIVE script.
          </div>
        </div>

        {/* ── MAC CONTROL ROOM ── */}
        <DCSection
          title="Mac · Live Control Room"
          subtitle="Full desktop window · avatars, distribution toggles, transport, pipeline, agents"
        >
          <DCArtboard width={1440} height={900} label="1440 × 900 · macOS window">
            <div style={{
              width: 1440, height: 900, background: '#e5e3de',
              padding: 30, display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <EmpireMac />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ── MOBILE ── */}
        <DCSection
          title="iOS · Seller companion"
          subtitle="Home monitor + capture flow. The seller films, the avatar sells."
          gap={56}
        >
          <DCArtboard width={520} height={980} label="iPhone 15 Pro · Home">
            <div style={{
              width: 520, height: 980, background: '#e5e3de',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <EmpireMobile screen="home" />
            </div>
          </DCArtboard>
          <DCArtboard width={520} height={980} label="iPhone 15 Pro · Capture (intake pipeline)">
            <div style={{
              width: 520, height: 980, background: '#e5e3de',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <EmpireMobile screen="capture" />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ── WEB VARIATIONS (gallery) ── */}
        {tweaks.showWeb && (
          <DCSection
            title="Web · three takes on the dashboard"
            subtitle="Earlier explorations — kept for reference."
            gap={56}
          >
            <DCArtboard width={1440} height={900} label="01 · Studio">
              <V1Studio />
            </DCArtboard>
            <DCArtboard width={1440} height={900} label="02 · Console">
              <V2Console />
            </DCArtboard>
            <DCArtboard width={1440} height={900} label="03 · Keynote">
              <V3Keynote />
            </DCArtboard>
          </DCSection>
        )}

        {/* Tweaks panel */}
        {tweaksOpen && (
          <div style={{
            position: 'fixed', right: 24, bottom: 24, width: 300,
            background: 'rgba(255,255,255,0.96)',
            backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
            border: `1px solid ${E.hair}`, borderRadius: 18,
            boxShadow: '0 12px 40px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06)',
            padding: 18, fontFamily: E.font, zIndex: 1000,
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: -0.2 }}>Tweaks</div>
              <div style={{ fontFamily: E.mono, fontSize: 10, color: E.ink3, letterSpacing: 0.6 }}>EMPIRE</div>
            </div>

            <div style={{
              fontFamily: E.mono, fontSize: 10, color: E.ink3,
              letterSpacing: 0.8, fontWeight: 600, marginBottom: 6,
            }}>MOBILE SCREEN</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 14 }}>
              {[{k:'home',l:'Home'},{k:'capture',l:'Capture'}].map(opt => (
                <button key={opt.k} onClick={() => update({ mobileScreen: opt.k })} style={{
                  padding: '8px 10px', borderRadius: 8,
                  border: `1px solid ${tweaks.mobileScreen === opt.k ? E.ink : E.hair}`,
                  background: tweaks.mobileScreen === opt.k ? E.ink : '#fff',
                  color: tweaks.mobileScreen === opt.k ? '#fff' : E.ink,
                  fontSize: 12, fontWeight: 500, cursor: 'pointer',
                }}>{opt.l}</button>
              ))}
            </div>

            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '10px 0', borderTop: `1px solid ${E.hair}`,
            }}>
              <span style={{ fontSize: 13, color: E.ink }}>Show web variations</span>
              <button onClick={() => update({ showWeb: !tweaks.showWeb })} style={{
                width: 42, height: 24, borderRadius: 999, border: 'none', padding: 2,
                background: tweaks.showWeb ? E.ink : '#e4e4e7',
                cursor: 'pointer', display: 'flex',
                justifyContent: tweaks.showWeb ? 'flex-end' : 'flex-start',
                transition: 'background 220ms',
              }}>
                <span style={{
                  width: 20, height: 20, borderRadius: '50%', background: '#fff',
                  boxShadow: '0 1px 2px rgba(0,0,0,0.2)',
                }} />
              </button>
            </div>

            <div style={{ marginTop: 10, fontSize: 11, color: E.ink3, lineHeight: 1.5 }}>
              Pinch to zoom · drag to pan. The live show loops across all artboards.
            </div>
          </div>
        )}
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
