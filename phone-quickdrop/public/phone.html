<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>quickdrop</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #8a8a8e;
      --accent: #ff3b30;
      --good: #30d158;
      --warn: #ff9f0a;
      --pill: rgba(255, 255, 255, 0.12);
      --pill-strong: rgba(255, 255, 255, 0.18);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.35 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      overflow: hidden; overscroll-behavior: none; user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex; flex-direction: column;
      padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
    }

    /* ---------- top status bar ---------- */
    .top {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      gap: 8px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--pill); border-radius: 999px;
      padding: 6px 11px; font-size: 12px; font-weight: 500; color: var(--fg);
      letter-spacing: 0.01em;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .dot.connected { background: var(--good); box-shadow: 0 0 6px rgba(48, 209, 88, 0.7); }
    .dot.connecting { background: var(--warn); animation: blink 1s linear infinite; }
    .dot.error { background: var(--accent); }
    @keyframes blink { 50% { opacity: 0.25; } }

    .timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--fg);
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .timer.on { opacity: 1; }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      margin-right: 7px; animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.8); }
    }

    /* ---------- live preview ---------- */
    .stage {
      flex: 1 1 auto; position: relative; overflow: hidden;
      background: #0a0a0b;
      display: flex; align-items: center; justify-content: center;
    }
    video.preview {
      width: 100%; height: 100%; object-fit: cover; background: #000;
      transform: scaleX(1);
    }
    video.preview.mirror { transform: scaleX(-1); }
    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 32px; text-align: center; color: var(--muted);
      pointer-events: none;
    }
    .placeholder.hidden { display: none; }
    .placeholder svg { width: 56px; height: 56px; opacity: 0.5; }
    .placeholder p { margin: 0; font-size: 14px; max-width: 280px; }

    /* ---------- bottom controls ---------- */
    .bottom {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 14px 22px 22px;
    }
    .side {
      display: flex; align-items: center; justify-content: center;
    }
    .side.left { justify-content: flex-start; }
    .side.right { justify-content: flex-end; }
    .iconbtn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--pill); border: none; color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .iconbtn:active { background: var(--pill-strong); transform: scale(0.94); }
    .iconbtn[disabled] { opacity: 0.3; }
    .iconbtn svg { width: 22px; height: 22px; }

    .recbtn {
      width: 78px; height: 78px; border-radius: 50%;
      background: transparent; border: 4px solid #fff;
      padding: 0; position: relative; transition: transform 0.1s ease;
    }
    .recbtn:active { transform: scale(0.95); }
    .recbtn .core {
      position: absolute; inset: 6px;
      border-radius: 50%;
      background: var(--accent);
      transition: border-radius 0.18s ease, inset 0.18s ease;
    }
    .recbtn.recording .core {
      inset: 22px; border-radius: 8px;
    }

    /* ---------- toast / hint area ---------- */
    .toast-host {
      position: absolute;
      left: 50%; bottom: calc(120px + var(--safe-bottom));
      transform: translate(-50%, 12px);
      pointer-events: none;
      display: flex; flex-direction: column-reverse; gap: 8px; align-items: center;
      width: max-content; max-width: calc(100vw - 28px);
    }
    .toast {
      background: rgba(20, 20, 22, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff; border-radius: 14px;
      padding: 9px 14px; font-size: 13px; font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      max-width: 100%; text-align: center;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.good { border: 1px solid rgba(48, 209, 88, 0.4); }
    .toast.bad { border: 1px solid rgba(255, 59, 48, 0.4); }
    .toast .ic { width: 14px; height: 14px; flex: 0 0 auto; }

    /* ---------- progress bar ---------- */
    .progress {
      position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
      background: transparent; overflow: hidden;
    }
    .progress > div {
      height: 100%; width: 0%; background: var(--good);
      transition: width 0.2s ease;
    }

    /* ---------- modal for stuck states ---------- */
    .modal {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 5;
    }
    .modal[hidden] { display: none; }
    .modal .card {
      background: #1c1c1e; border-radius: 18px; padding: 22px;
      max-width: 340px; text-align: center;
    }
    .modal h2 { margin: 0 0 10px; font-size: 17px; font-weight: 600; }
    .modal p { margin: 0 0 16px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .modal button {
      background: var(--accent); border: none; color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-weight: 600; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="top">
    <span class="pill">
      <span id="dot" class="dot connecting"></span>
      <span id="conn-text">connecting</span>
    </span>
    <span id="timer" class="pill timer">
      <span class="rec-dot"></span><span id="timer-text">0:00</span>
    </span>
    <span id="size-pill" class="pill" style="opacity: 0;"><span id="size-text">0 KB</span></span>
  </div>

  <div class="stage">
    <video id="preview" class="preview" autoplay playsinline muted></video>
    <div id="placeholder" class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 7a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/>
        <path d="M16 10l4-2.5v9L16 14"/>
      </svg>
      <p>Tap the red button to start. Camera will turn on after permission.</p>
    </div>
    <div class="toast-host" id="toast-host"></div>
    <div class="progress" id="progress"><div></div></div>
  </div>

  <div class="bottom">
    <div class="side left">
      <button id="flip" class="iconbtn" aria-label="flip camera" title="flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M3 7h13l-2-2"/><path d="M21 17H8l2 2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="side">
      <button id="rec" class="recbtn" aria-label="record">
        <span class="core"></span>
      </button>
    </div>
    <div class="side right">
      <button id="mute" class="iconbtn" aria-label="toggle mic" title="toggle mic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="9" y="3" width="6" height="11" rx="3"/>
          <path d="M5 11a7 7 0 0014 0M12 18v3"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="errModal" class="modal" hidden>
    <div class="card">
      <h2 id="errTitle">Couldn't start camera</h2>
      <p id="errBody">Allow camera and mic access in Safari, then tap Try again.</p>
      <button id="errBtn">Try again</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    // ---------- dom ----------
    const $ = (id) => document.getElementById(id);
    const dot = $("dot");
    const connText = $("conn-text");
    const timerEl = $("timer");
    const timerText = $("timer-text");
    const sizePill = $("size-pill");
    const sizeText = $("size-text");
    const preview = $("preview");
    const placeholder = $("placeholder");
    const recBtn = $("rec");
    const flipBtn = $("flip");
    const muteBtn = $("mute");
    const toastHost = $("toast-host");
    const progressEl = $("progress").firstElementChild;
    const errModal = $("errModal");
    const errTitle = $("errTitle");
    const errBody = $("errBody");
    const errBtn = $("errBtn");

    // ---------- state ----------
    let ws = null;
    let wsReady = false;
    let stream = null;
    let recorder = null;
    let recording = false;
    let sessionId = null;
    let sessionMime = null;
    let sessionExt = null;
    let bytesSent = 0;
    let chunkCount = 0;
    let startedAt = 0;
    let timerHandle = null;
    let facingMode = "environment";
    let micOn = true;
    let wakeLock = null;
    let pendingChunks = []; // queued while WS not ready (rare)
    // Outstanding ev.data.arrayBuffer() promises. Must drain before we send
    // "end", otherwise the final chunk races the end-marker and gets dropped.
    const pendingSends = new Set();

    // ---------- mime negotiation ----------
    function pickMimeType() {
      const candidates = [
        "video/mp4;codecs=avc1.42E01E,mp4a.40.2", // iOS preferred
        "video/mp4;codecs=avc1",
        "video/mp4",
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm",
      ];
      for (const c of candidates) {
        try { if (MediaRecorder.isTypeSupported(c)) return c; } catch {}
      }
      return ""; // browser default
    }
    function extFromMime(mime) {
      if (!mime) return "bin";
      if (mime.startsWith("video/mp4")) return "mp4";
      if (mime.startsWith("video/webm")) return "webm";
      if (mime.startsWith("video/quicktime")) return "mov";
      return "bin";
    }

    // ---------- WS ----------
    function wsURL() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      return `${proto}//${location.host}/ws`;
    }
    function setConn(state, label) {
      dot.classList.remove("connected", "connecting", "error");
      dot.classList.add(state);
      connText.textContent = label;
    }
    function connectWS() {
      try {
        ws = new WebSocket(wsURL());
        ws.binaryType = "arraybuffer";
        setConn("connecting", "connecting");
      } catch (e) {
        setConn("error", "no link");
        scheduleReconnect();
        return;
      }
      ws.addEventListener("open", () => {
        wsReady = true;
        setConn("connected", "ready");
        // If we died mid-recording, ask the server to resume this sessionId
        // before we flush queued chunks. WebSocket preserves order within a
        // single connection, so chunks sent next will land after the resume.
        if (recording && sessionId) {
          try {
            ws.send(JSON.stringify({
              type: "start",
              sessionId,
              mime: sessionMime || "application/octet-stream",
              ext: sessionExt || "bin",
              resume: true,
              ts: startedAt,
            }));
          } catch { /* will close and reconnect */ }
        }
        for (const buf of pendingChunks) ws.send(buf);
        pendingChunks = [];
      });
      ws.addEventListener("message", (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type === "saved") {
          const mb = (msg.bytes / 1024 / 1024).toFixed(2);
          toast(`saved · ${mb} MB · ${msg.fileName}`, "good");
          progressEl.style.width = "0%";
        } else if (msg.type === "error") {
          toast(`server: ${msg.reason}`, "bad");
        }
      });
      ws.addEventListener("close", () => {
        wsReady = false;
        setConn("error", "offline");
        scheduleReconnect();
      });
      ws.addEventListener("error", () => {
        // close handler will follow
      });
    }
    let reconnectTimer = null;
    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectWS();
      }, 1500);
    }
    function wsSend(payload) {
      if (wsReady && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(payload);
      } else {
        // Queue (cap to avoid runaway memory; phone bandwidth >> file size on LAN)
        if (pendingChunks.length < 4096) pendingChunks.push(payload);
      }
    }

    // ---------- camera ----------
    async function ensureCamera() {
      if (stream) return stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30 },
          },
          audio: micOn ? { echoCancellation: true, noiseSuppression: true } : false,
        });
      } catch (e) {
        showError(
          "Camera blocked",
          "Tap the AA in the address bar → Website Settings → Allow Camera & Microphone, then reload."
        );
        throw e;
      }
      preview.srcObject = stream;
      preview.classList.toggle("mirror", facingMode === "user");
      placeholder.classList.add("hidden");
      return stream;
    }
    async function stopCamera() {
      if (recording) await stopRecording();
      if (stream) {
        for (const t of stream.getTracks()) t.stop();
        stream = null;
        preview.srcObject = null;
      }
    }
    async function flipCamera() {
      facingMode = facingMode === "environment" ? "user" : "environment";
      const wasRecording = recording;
      if (wasRecording) await stopRecording();
      await stopCamera();
      try {
        await ensureCamera();
      } catch {
        // flip back if the new mode failed
        facingMode = facingMode === "environment" ? "user" : "environment";
        await ensureCamera();
      }
      if (wasRecording) startRecording();
    }
    function toggleMic() {
      micOn = !micOn;
      muteBtn.style.opacity = micOn ? "1" : "0.45";
      if (stream) {
        for (const t of stream.getAudioTracks()) t.enabled = micOn;
      }
    }

    // ---------- wake lock ----------
    async function acquireWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch { /* not fatal */ }
    }
    function releaseWakeLock() {
      try { wakeLock && wakeLock.release && wakeLock.release(); } catch {}
      wakeLock = null;
    }

    // ---------- recording ----------
    async function startRecording() {
      if (recording) return;
      try { await ensureCamera(); } catch { return; }
      const mime = pickMimeType();
      const ext = extFromMime(mime);
      try {
        recorder = mime
          ? new MediaRecorder(stream, {
              mimeType: mime,
              videoBitsPerSecond: 6_000_000,
              audioBitsPerSecond: 128_000,
            })
          : new MediaRecorder(stream);
      } catch (e) {
        showError("Recorder failed", `Couldn't init MediaRecorder (${e.message}).`);
        return;
      }

      sessionId = (crypto.randomUUID && crypto.randomUUID()) ||
        ("s" + Math.random().toString(36).slice(2) + Date.now().toString(36));
      sessionMime = recorder.mimeType || mime || "application/octet-stream";
      sessionExt = ext;
      bytesSent = 0;
      chunkCount = 0;
      startedAt = Date.now();
      pendingSends.clear();

      // Tell server a recording is starting
      wsSend(JSON.stringify({
        type: "start",
        sessionId,
        mime: sessionMime,
        ext: sessionExt,
        ts: startedAt,
      }));

      recorder.ondataavailable = (ev) => {
        if (!ev.data || ev.data.size === 0) return;
        chunkCount += 1;
        bytesSent += ev.data.size;
        // Schedule the arrayBuffer conversion and remember the promise so
        // onstop can drain it before sending "end".
        const p = ev.data.arrayBuffer()
          .then((buf) => { wsSend(buf); updateSizePill(); })
          .catch(() => { /* ignore; recorder error handler reports */ });
        pendingSends.add(p);
        p.finally(() => pendingSends.delete(p));
      };
      recorder.onstop = async () => {
        // Drain any in-flight chunk conversions so the last chunk beats "end".
        if (pendingSends.size) {
          try { await Promise.allSettled([...pendingSends]); } catch {}
        }
        wsSend(JSON.stringify({
          type: "end",
          sessionId,
          totalBytes: bytesSent,
          chunks: chunkCount,
        }));
        sessionId = null;
        sessionMime = null;
        sessionExt = null;
        recorder = null;
      };
      recorder.onerror = (ev) => {
        toast(`recorder: ${ev.error?.name || "error"}`, "bad");
      };

      // 250ms timeslice = chunks fly while you're still recording.
      // By the time you tap Stop, almost everything is already on the laptop.
      recorder.start(250);
      recording = true;
      recBtn.classList.add("recording");
      timerEl.classList.add("on");
      sizePill.style.opacity = "1";
      startTimer();
      acquireWakeLock();
    }

    async function stopRecording() {
      if (!recording) return;
      recording = false;
      recBtn.classList.remove("recording");
      timerEl.classList.remove("on");
      stopTimer();
      releaseWakeLock();
      try { recorder && recorder.state !== "inactive" && recorder.stop(); } catch {}
      progressEl.style.width = "100%";
      // sizePill fades out after a beat
      setTimeout(() => { sizePill.style.opacity = "0"; }, 1800);
    }

    // ---------- timer & size ----------
    function startTimer() {
      const tick = () => {
        const ms = Date.now() - startedAt;
        const s = Math.floor(ms / 1000);
        const mm = Math.floor(s / 60);
        const ss = String(s % 60).padStart(2, "0");
        timerText.textContent = `${mm}:${ss}`;
      };
      tick();
      timerHandle = setInterval(tick, 250);
    }
    function stopTimer() {
      clearInterval(timerHandle);
      timerHandle = null;
    }
    function updateSizePill() {
      const mb = bytesSent / 1024 / 1024;
      sizeText.textContent = mb >= 1 ? `${mb.toFixed(1)} MB` : `${(bytesSent / 1024).toFixed(0)} KB`;
    }

    // ---------- toast ----------
    function toast(text, kind) {
      const el = document.createElement("div");
      el.className = `toast ${kind || ""}`;
      el.textContent = text;
      toastHost.appendChild(el);
      requestAnimationFrame(() => el.classList.add("show"));
      setTimeout(() => {
        el.classList.remove("show");
        setTimeout(() => el.remove(), 250);
      }, 2400);
    }

    // ---------- error modal ----------
    function showError(title, body) {
      errTitle.textContent = title;
      errBody.textContent = body;
      errModal.hidden = false;
    }
    errBtn.addEventListener("click", async () => {
      errModal.hidden = true;
      try { await ensureCamera(); } catch {}
    });

    // ---------- input handlers ----------
    recBtn.addEventListener("click", () => {
      if (recording) stopRecording(); else startRecording();
    });
    flipBtn.addEventListener("click", () => { flipCamera(); });
    muteBtn.addEventListener("click", () => { toggleMic(); });

    // re-acquire wake lock when page becomes visible again mid-recording
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && recording && !wakeLock) {
        acquireWakeLock();
      }
    });

    // ---------- boot ----------
    connectWS();
    // Don't auto-open camera until user taps record (better permission UX on iOS).
  })();
  </script>
</body>
</html>
